<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<style>
/* ============================================================
   rich-doc Design Tokens — 暖色橙棕主题
   所有 HTML 模板 @import 此文件
   ============================================================ */
:root {
  /* 品牌色 */
  --color-primary:   #92400e;   /* 深棕   — 标题、边框强调 */
  --color-accent:    #ea580c;   /* 橙     — 高亮、数字、徽章 */
  --color-success:   #15803d;   /* 绿     — 好/推荐 */
  --color-warning:   #ca8a04;   /* 金     — 注意/警告 */
  --color-danger:    #dc2626;   /* 红     — 坏/风险 */

  /* 背景 */
  --color-bg:        #fffbeb;   /* 暖白   — 页面背景 */
  --color-card:      #ffffff;   /* 纯白   — 卡片背景 */
  --color-muted:     #fef3c7;   /* 浅黄   — 次要区块背景 */

  /* 文字 */
  --color-text:      #1c1917;   /* 近黑   — 正文 */
  --color-text-sub:  #78716c;   /* 灰棕   — 副文本、caption */

  /* 成功/危险卡片 */
  --color-success-bg:  #f0fdf4;
  --color-success-bd:  #86efac;
  --color-danger-bg:   #fff1f2;
  --color-danger-bd:   #fca5a5;
  --color-warning-bg:  #fefce8;
  --color-warning-bd:  #fde68a;

  /* 几何 */
  --radius-sm:   8px;
  --radius-md:   12px;
  --radius-lg:   16px;
  --shadow-sm:   0 1px 4px rgba(0,0,0,0.07);
  --shadow-md:   0 2px 10px rgba(0,0,0,0.09);
  --padding-fig: 40px;          /* 图内边距统一值 */

  /* 字体 */
  --font:        -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
  --font-title:  700 18px/1.3 var(--font);
  --font-body:   400 13px/1.6 var(--font);
  --font-cap:    400 11px/1.4 var(--font);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--color-bg);padding:40px 48px 44px}
h1{text-align:center;font-size:20px;font-weight:700;color:var(--color-primary);margin-bottom:8px}
.subtitle{text-align:center;font-size:13px;color:var(--color-text-sub);margin-bottom:28px}
.layer{border-radius:14px;padding:16px 20px 14px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,0.07)}
.layer.core  {background:#fef3c7;border:2px solid #f59e0b}
.layer.style {background:#dcfce7;border:2px solid #86efac}
.layer.ai    {background:#dbeafe;border:2px solid #93c5fd}
.layer-title{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px}
.layer.core  .layer-title{color:#92400e}
.layer.style .layer-title{color:#14532d}
.layer.ai    .layer-title{color:#1e40af}
.chips{display:flex;gap:10px;flex-wrap:wrap}
.chip{padding:8px 16px;border-radius:10px;font-size:13px;font-weight:600;display:flex;flex-direction:column;gap:2px}
.chip-name{font-weight:700;font-size:14px}
.chip-desc{font-size:11px;font-weight:400;opacity:.8}
.layer.core  .chip{background:#fffbeb;border:1px solid #fcd34d;color:#92400e}
.layer.style .chip{background:#f0fdf4;border:1px solid #86efac;color:#14532d}
.layer.ai    .chip{background:#eff6ff;border:1px solid #93c5fd;color:#1e40af}
</style>
</head>
<body>
<h1>AI 时代推荐前端技术栈</h1>
<div class="subtitle">西方市场 / 创业 / 设计驱动 / AI 生成语境</div>

<div class="layer core">
  <div class="layer-title">🏗 核心层</div>
  <div class="chips">
    <div class="chip"><span class="chip-name">Next.js 16+</span><span class="chip-desc">App Router · SSR/SSG</span></div>
    <div class="chip"><span class="chip-name">React 18+</span><span class="chip-desc">函数组件 · JSX</span></div>
    <div class="chip"><span class="chip-name">TypeScript strict</span><span class="chip-desc">类型驱动 · AI 契约</span></div>
  </div>
</div>

<div class="layer style">
  <div class="layer-title">🎨 样式层</div>
  <div class="chips">
    <div class="chip"><span class="chip-name">Tailwind CSS v4</span><span class="chip-desc">原子类 · 编译期消除 · llms.txt</span></div>
    <div class="chip"><span class="chip-name">shadcn/ui</span><span class="chip-desc">copy-in · v0 默认输出 · 零运行时</span></div>
  </div>
</div>

<div class="layer ai">
  <div class="layer-title">🤖 数据 / AI 层</div>
  <div class="chips">
    <div class="chip"><span class="chip-name">Vercel AI SDK 5</span><span class="chip-desc">useChat · SSE 流式 · Edge Runtime</span></div>
    <div class="chip"><span class="chip-name">React Query</span><span class="chip-desc">可选 · 客户端缓存</span></div>
  </div>
</div>
</body>
</html>
